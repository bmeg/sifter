
class: sifter
name: RefGenome

config:
  gtfPath: ftp://ftp.ensembl.org/pub/grch37/release-96/gff3/homo_sapiens/Homo_sapiens.GRCh37.87.gff3.gz
  schema: ./bmeg-dictionary/gdcdictionary/schemas

inputs:
  gtfReader:
    tableLoad:
      input: "{{config.gtfPath}}"
      columns:
        - seqid
        - source
        - type
        - start
        - end
        - score
        - strand
        - phase
        - attributes

pipelines:
  transform:
    - from: gtfReader
    - fieldParse:
        field: attributes
        sep: ";"
    - fieldType:
        start: integer
        end: integer

  exons:
    - from: transform
    - filter:
        field: type
        match: exon
    - regexReplace:
        field: Parent
        regex: "^transcript:"
        replace: ""
        dst: transcript_id
    - project:
        mapping:
          exon_id: "{{row.exon_id}}"
          transcript_id: ["{{row.transcript_id}}"]
    - reduce:
        field: exon_id
        method: merge
        python: |
          def merge(x, y):
            x['transcript_id'] = x['transcript_id'] + y['transcript_id']
            return x
    - objectValidate:
        title: exon
        schema: "{{config.schema}}"
    - emit:
        name: exon

  genes:
    - from: transform
    - filter:
        field: type
        match: gene
    - project:
        mapping:
          gene_id: "{{row.gene_id}}"
    - objectValidate:
        title: gene
        schema: "{{config.schema}}"
    - emit:
        name: gene

  transcripts:
    - from: transform
    - filter:
        field: type
        match: mRNA
    - regexReplace:
        field: Parent
        regex: "^gene:"
        replace: ""
        dst: gene_id
    - project:
        mapping:
          transcript_id: "{{row.transcript_id}}"
    - objectValidate:
        title: transcript
        schema: "{{config.schema}}"
    - emit:
        name: transcript
