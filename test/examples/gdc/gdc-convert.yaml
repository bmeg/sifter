
name: gdc
outdir: output/

params:
  cases: 
    type: file
    default: ../../resources/gdc-case.json.gz
  schema: 
    type: path
    default: ../../resources/schemas

inputs:
  caseData:
    jsonLoad:
      input: "{{params.cases}}"

pipelines:
  caseObject:
    - from: caseData
    - project:
        mapping:
          studies: "{{row.project.project_id}}"
          experiments: "exp:{{row.project.project_id}}"
          type: case
    - objectValidate:
        title: Case
        schema: "{{params.schema}}"
    - emit:
        # Testing that this doesn't do anything
        useName: False
        name: case

  caseGraph:
    - from: caseObject
    - graphBuild:
        schema: "{{params.schema}}"
        title: Case
        EdgeFix:
          method: test
          gpython:
            $ref: test.py
