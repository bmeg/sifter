
name: gdc
outdir: output/

params:
  cases: 
    type: file
    default: ../../resources/gdc-case.json.gz
  schema: 
    type: path
    default: ../../resources/schemas

inputs:
  caseData:
    jsonLoad:
      path: "{{params.cases}}"

outputs:
  caseFile:
    json:
      path: gdc.caseObject.case.json.gz
      from: caseObject
  caseGraph:
    graph:
      path: gdc.caseGraph
      from: caseObject
      schema: "{{params.schema}}"
      title: Case
      EdgeFix:
        method: test
        gpython:
          $ref: test.py


pipelines:
  caseObject:
    - from: caseData
    - project:
        mapping:
          studies: "{{row.project.project_id}}"
          experiments: "exp:{{row.project.project_id}}"
          type: case
    - objectValidate:
        title: Case
        schema: "{{params.schema}}"
