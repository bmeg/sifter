
name: geneTable
outdir: output/

docs: >
  This takes a Gene TSV, filters rows, selects columns and outputs a 2
  column TSV into the working directory

params:
  geneTSV:
    type: File
    default: ../../resources/gene2ensembl.gz

inputs:
  genes:
    tableLoad:
      input: "{{params.geneTSV}}"
      columns:
        - tax_id
        - GeneID
        - Ensembl_gene_identifier
        - RNA_nucleotide_accession.version
        - Ensembl_rna_identifier
        - protein_accession.version
        - Ensembl_protein_identifier

outputs:
  geneTable:
    table:
      from: translate
      output: "gene.table"
      columns:
        - GeneID
        - Ensembl_gene_identifier

pipelines:
  translate:
    - from: genes
    - filter:
        field: tax_id
        match: "9606"

