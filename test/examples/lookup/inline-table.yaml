
outdir: output/

params:
  json:
    type: File
    default: ../../resources/projects.json


inputs:
  jsonData:
    jsonLoad:
      path: "{{params.json}}"

outputs:
  translated:
    json:
      path: sifter.transform.test.json.gz
      from: transform

pipelines:
  transform:
    - from: jsonData
    - lookup:
        replace: id
        table:
          TCGA-KIRC: 1
          TCGA-SARC: 2
