
outdir: output/

params:
  json:
    type: File
    default: ../../resources/projects.json


inputs:
  jsonData:
    jsonLoad:
      input: "{{params.json}}"


pipelines:
  transform:
    - from: jsonData
    - lookup:
        replace: id
        table:
          TCGA-KIRC: 1
          TCGA-SARC: 2
    - emit:
        name: test
