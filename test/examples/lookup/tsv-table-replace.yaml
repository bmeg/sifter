
name: gdc-projects

outdir: output-tsv/

params:
  cases:
    type: File
    default: ../../resources/case.json
  diseaseTSV:
    type: File
    default: ../../resources/disease_table.tsv

inputs:
  caseReader:
    jsonLoad:
      input: "{{params.cases}}"

outputs:
  case-mondo:
    json:
      output: gdc-projects.transform.case-mondo.json.gz
      from: transform

pipelines:
  transform:
    - from: caseReader
    - fieldProcess:
        field: project
    - lookup:
        replace: disease_type
        tsv:
          input: "{{params.diseaseTSV}}"
          header:
            - disease
            - mondo
          key: disease
          value: mondo
