
outdir: output_gene

params:
  sifFile:
    type: File
    default: ../../resources/pathways.sif

inputs:
  sifFile:
    tableLoad:
      path: "{{params.sifFile}}"
      sep: "\t"
      columns: [_from, _label, _to]

outputs:
  sifout:
    json:
      path: sifout.json.gz
      from: geneReduce

pipelines:
  geneReduce:
    - from: sifFile
    - reduce:
        field: _from
        init: { "_to" : [] }
        method: merge
        gpython: |
          def merge(x,y):
            y["_from"] = x["_from"]
            y["_to"].append(x["_to"])
            return y
