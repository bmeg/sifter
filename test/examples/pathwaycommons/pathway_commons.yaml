
name: pathway_commons
outdir: output

params:
  sifFile:
    type: File
    default: ../../resources/pathways.sif

inputs:
  sifFile:
    tableLoad:
      path: "{{params.sifFile}}"
      sep: "\t"
      columns: [_from, _label, _to]

outputs:
  edgeFile:
    json:
      from: sifFile
      path: pathway_commons.edges.json.gz
  nodeFile:
    json:
      from: nodes
      path: pathway_commons.nodes.json.gz

pipelines:
  nodes:
    - from: sifFile
    - project:
        mapping:
          nodes:
            - { "_gid" : "{{row._from}}" }
            - { "_gid" : "{{row._to}}" }
    - fieldProcess:
        field: nodes
    - distinct:
        value: "{{row._gid}}"
    - project:
        mapping:
          _label: "Protein"
