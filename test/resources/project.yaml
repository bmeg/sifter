
class: Playbook


params:
  genes: 
    type: File
    default: ./gene_with_protein_product.json

inputs:
  geneData:
    jsonLoad:
      input: "{{params.genes}}"


pipelines:
  step1:
    - from: geneData
    - project:
          mapping:
            _id: "{{row.ensembl_gene_id}}"
    - emit:
        name: new_ids
