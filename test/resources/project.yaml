
class: Playbook


params:
  genes: 
    type: File
    default: ./gene_with_protein_product.json

inputs:
  geneData:
    jsonLoad:
      path: "{{params.genes}}"

outputs:
  new_ids:
    json:
      from: step1
      path: new_ids.ndjson

pipelines:
  step1:
    - from: geneData
    - project:
          mapping:
            _id: "{{row.ensembl_gene_id}}"
